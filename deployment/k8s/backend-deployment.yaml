apiVersion: apps/v1
kind: Deployment
metadata:
  name: dr-backend
  labels:
    app: dr-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: dr-backend
  template:
    metadata:
      labels:
        app: dr-backend
    spec:
      containers:
      - name: backend
        image: your-registry/dr-backend:latest
        ports:
        - containerPort: 8000
        resources:
          limits:
            nvidia.com/gpu: 1
            memory: "16Gi"
            cpu: "4"
---
apiVersion: v1
kind: Service
metadata:
  name: dr-backend-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: dr-backend
